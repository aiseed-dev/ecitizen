<p>秋田県の大潟村は、昭和39年10月1日に八郎潟の干拓地に誕生しました。既存の市町村の合併や分割でない新設自治体としては最後です。八郎潟の干拓は、干拓面積 17,239haにおよぶ大規模な干拓であったため、それを一つの自治体にするのが適当だということで、「大規模な公有水面の埋立に伴う村の設置に係る地方自治法等の特例に関する法律」まで作られました。八郎潟の干拓と大潟村の歴史については、大潟村のホームページに詳しく記載されています。</p>
